services:
  postgres:
    image: postgres:16-alpine
    container_name: prospec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      # Uma query real (não só pg_isready) garante que o banco terminou a
      # recuperação de startup antes de o app conectar — evita o
      # "FATAL: the database system is starting up" em volumes grandes.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c work_mem=32MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9

  app:
    build: ./app
    container_name: prospec_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me-in-production}
      PEDIDO_MOBILE_BASE_URL: ${PEDIDO_MOBILE_BASE_URL:-https://pedidomobile.com/webservice/v3}
      PEDIDO_MOBILE_USER: ${PEDIDO_MOBILE_USER:-}
      PEDIDO_MOBILE_PASSWORD: ${PEDIDO_MOBILE_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prospec_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin

  # Serviço para rodar os scripts ETL da Etapa 2.
  # Não sobe com 'docker compose up' — usar com --profile etl.
  # Exemplos:
  #   docker compose --profile etl run --rm etl python download.py
  #   docker compose --profile etl run --rm etl python importer.py
  #   docker compose --profile etl run --rm etl python validators.py
  etl:
    build: ./app
    profiles: ["etl"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PEDIDO_MOBILE_BASE_URL: ${PEDIDO_MOBILE_BASE_URL:-https://pedidomobile.com/webservice/v3}
      PEDIDO_MOBILE_USER: ${PEDIDO_MOBILE_USER:-}
      PEDIDO_MOBILE_PASSWORD: ${PEDIDO_MOBILE_PASSWORD:-}
    volumes:
      - ./app:/code
      - ./etl:/etl
      - ./downloads:/downloads
    working_dir: /etl
